name: Generate Manifest (Pro Beta)
run-name: Generate Manifest (Pro Beta) ${{ inputs.tag_name }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        type: string
        description: "Which tag are you using? (ex: v1.0.0+0)"
        required: true
  workflow_call:
    inputs:
      tag_name:
        type: string
        description: "Which tag are you using? (ex: v1.0.0+0)"
        required: true

jobs:
  get_version:
    name: Get version
    runs-on: ubuntu-22.04
    outputs:
      release: ${{ steps.version_step.outputs.release }}
      version: ${{ steps.version_step.outputs.version }}
    steps:
      - name: Set version
        id: version_step
        run: |
          RELEASE=$(echo "$TAG_NAME" | sed -e "s/v//")
          echo "release: $RELEASE"

          VERSION=$(echo "$TAG_NAME" | sed -e "s/v//" -e "s/+/./")
          echo "version: $VERSION"

          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          TAG_NAME: ${{ inputs.tag_name }}

  generate:
    runs-on: ubuntu-22.04
    needs: get_version
    steps:
      - uses: actions/checkout@v6

      - name: Install msitools
        run: |
          if ! command -v msiinfo >/dev/null 2>&1; then
            echo "msitools not exists"
            sudo apt-get update
            sudo apt-get install msitools
          fi
          msiinfo --version

      - name: Get SHA256
        id: sha256
        shell: bash
        run: |
          set -euo pipefail

          base="https://github.com/picguard/picguard/releases/download/v${RELEASE}.rc"

          # 这里维护所有语言：前缀prefix + locale（文件名后缀）
          # prefix 决定输出变量名：${prefix}sha256 / ${prefix}productcode / ${prefix}upgradecode
          declare -a items=(
            "en:en-US"
            "zh:zh-CN"
          )

          for item in "${items[@]}"; do
            prefix="${item%%:*}"
            locale="${item##*:}"

            file="picguard-pro-${VERSION}.rc-windows-x64-${locale}.msi"
            url="${base}/${file}"

            echo "Downloading: ${url}"
            curl -fL \
              -H "Authorization: Bearer ${TOKEN}" \
              -o "${file}" \
              "${url}"

            sha="$(sha256sum "${file}" | cut -c 1-64 | tr '[:lower:]' '[:upper:]')"
            product="$(msiinfo export "${file}" Property | sed -n 's/^ProductCode[[:space:]]\+//p' | cut -c 1-38)"
            upgrade="$(msiinfo export "${file}" Property | sed -n 's/^UpgradeCode[[:space:]]\+//p' | cut -c 1-38)"

            {
              echo "${prefix}sha256=${sha}"
              echo "${prefix}productcode=${product}"
              echo "${prefix}upgradecode=${upgrade}"
            } >> "$GITHUB_OUTPUT"
          done
        env:
          TOKEN: ${{ secrets.PG_RELEASE_TOKEN }}
          RELEASE: ${{ needs.get_version.outputs.release }}
          VERSION: ${{ needs.get_version.outputs.version }}

      - name: Get ReleaseDate
        id: date
        run: |
          echo "releasedate=$( \
            curl -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              https://api.github.com/repos/picguard/picguard/releases/tags/v${{ inputs.tag_name }}.rc \
            | jq -r '.published_at' \
            | cut -c 1-10 \
          )" >> $GITHUB_OUTPUT

      - name: Replace
        shell: bash
        run: |
          set -euo pipefail

          installer="./beta/PicGuard.PicGuard.Pro.Beta.installer.yaml"

          # 先做全局变量
          sed -i \
            -e "s/\${version}/${VERSION}/g" \
            -e "s/\${release}/${RELEASE}/g" \
            -e "s/\${releasedate}/${RELEASEDATE}/g" \
            "$installer"

          # 一个映射表：prefix -> locale
          items=(
            "en:en-US"
            "zh:zh-CN"
          )

          for item in "${items[@]}"; do
            p="${item%%:*}"       # prefix
            loc="${item##*:}"     # locale

            up="$(echo "$p" | tr '[:lower:]' '[:upper:]')"

            sha_var="${up}SHA256"
            prod_var="${up}PRODUCT"
            upg_var="${up}UPGRADE"

            sha="${!sha_var}"
            prod="${!prod_var}"
            upg="${!upg_var}"

            # installer.yaml：替换 sha / productcode / upgradecode
            sed -i \
              -e "s/\${${p}sha256}/${sha}/g" \
              -e "s/'\${${p}productcode}'/'${prod}'/g" \
              -e "s/'\${${p}upgradecode}'/'${upg}'/g" \
              "$installer"

            # locale.<loc>.yaml：只替 version / release
            f="./beta/PicGuard.PicGuard.Pro.Beta.locale.${loc}.yaml"
            sed -i \
              -e "s/\${version}/${VERSION}/g" \
              -e "s/\${release}/${RELEASE}/g" \
              "$f"
          done

          # 主入口 yaml
          sed -i -e "s/\${version}/${VERSION}/g" ./beta/PicGuard.PicGuard.Pro.Beta.yaml
        env:
          VERSION: ${{ needs.get_version.outputs.version }}
          RELEASE: ${{ needs.get_version.outputs.release }}
          RELEASEDATE: ${{ steps.date.outputs.releasedate }}
          # 把 step outputs 映射成环境变量，方便在 bash 循环里间接引用
          ENSHA256: ${{ steps.sha256.outputs.ensha256 }}
          ENPRODUCT: ${{ steps.sha256.outputs.enproductcode }}
          ENUPGRADE: ${{ steps.sha256.outputs.enupgradecode }}

          ZHSHA256: ${{ steps.sha256.outputs.zhsha256 }}
          ZHPRODUCT: ${{ steps.sha256.outputs.zhproductcode }}
          ZHUPGRADE: ${{ steps.sha256.outputs.zhupgradecode }}

      - uses: actions/upload-artifact@v7
        with:
          name: manifest-pro-${{ inputs.tag_name }}.rc
          path: |
            ./beta/PicGuard.PicGuard.Pro.Beta.installer.yaml
            ./beta/PicGuard.PicGuard.Pro.Beta.locale.*.yaml
            ./beta/PicGuard.PicGuard.Pro.Beta.yaml
