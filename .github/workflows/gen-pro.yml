name: Generate Manifest (Pro)
run-name: Generate Manifest (Pro) ${{ inputs.tag_name }}

on:
  workflow_dispatch:
    inputs:
      tag_name:
        type: string
        description: "Which tag are you using? (ex: v1.0.0+0)"
        required: true
  workflow_call:
    inputs:
      tag_name:
        type: string
        description: "Which tag are you using? (ex: v1.0.0+0)"
        required: true

jobs:
  get_version:
    name: Get version
    runs-on: ubuntu-22.04
    outputs:
      release: ${{ steps.version_step.outputs.release }}
      version: ${{ steps.version_step.outputs.version }}
    steps:
      - name: Set version
        id: version_step
        run: |
          RELEASE=$(echo "$TAG_NAME" | sed -e "s/v//")
          echo "release: $RELEASE"

          VERSION=$(echo "$TAG_NAME" | sed -e "s/v//" -e "s/+/./")
          echo "version: $VERSION"

          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        env:
          TAG_NAME: ${{ inputs.tag_name }}

  generate:
    runs-on: ubuntu-22.04
    needs: get_version
    steps:
      - uses: actions/checkout@v6

      - name: Install msitools
        run: |
          if ! command -v msiinfo >/dev/null 2>&1; then
            echo "msitools not exists"
            sudo apt-get update
            sudo apt-get install msitools
          fi
          msiinfo --version

      - name: Get SHA256
        id: sha256
        shell: bash
        run: |
          set -euo pipefail

          base="https://github.com/picguard/picguard/releases/download/v${RELEASE}"

          # 这里维护所有语言和架构的组合：前缀prefix + locale（文件名后缀）+ arch（架构）
          # prefix 决定输出变量名：${prefix}_${arch}_sha256 / ${prefix}_${arch}_productcode / ${prefix}_${arch}_upgradecode
          declare -a items=(
            "en:en-US:x64"
            "en:en-US:arm64"
            "zh:zh-CN:x64"
            "zh:zh-CN:arm64"
          )

          for item in "${items[@]}"; do
            prefix="${item%%:*}"
            temp="${item#*:}"
            locale="${temp%%:*}"
            arch="${temp##*:}"

            file="picguard-pro-${VERSION}-windows-${arch}-${locale}.msi"
            url="${base}/${file}"

            echo "Downloading: ${url}"
            curl -fL \
              -H "Authorization: Bearer ${RELEASE_TOKEN}" \
              -o "${file}" \
              "${url}"

            sha="$(sha256sum "${file}" | cut -c 1-64 | tr '[:lower:]' '[:upper:]')"
            product="$(msiinfo export "${file}" Property | sed -n 's/^ProductCode[[:space:]]\+//p' | cut -c 1-38)"
            upgrade="$(msiinfo export "${file}" Property | sed -n 's/^UpgradeCode[[:space:]]\+//p' | cut -c 1-38)"

            {
              echo "${prefix}_${arch}_sha256=${sha}"
              echo "${prefix}_${arch}_productcode=${product}"
              echo "${prefix}_${arch}_upgradecode=${upgrade}"
            } >> "$GITHUB_OUTPUT"
          done
        env:
          RELEASE_TOKEN: ${{ secrets.PG_RELEASE_TOKEN }}
          RELEASE: ${{ needs.get_version.outputs.release }}
          VERSION: ${{ needs.get_version.outputs.version }}

      - name: Get Release Date
        id: date
        run: |
          echo "release_date=$( \
            curl -L \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${{ github.token }}" \
              https://api.github.com/repos/picguard/picguard/releases/tags/${{ inputs.tag_name }} \
            | jq -r '.published_at' \
            | cut -c 1-10 \
          )" >> $GITHUB_OUTPUT

#      - name: Replace ReleaseNote URL
#        id: releasenote
#        run: |
#          echo "url=$(echo ${{ inputs.release-note-url }} | sed 's@[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/$@@')" >> $GITHUB_OUTPUT
#          echo "url-ja=$(echo ${{ inputs.release-note-url-ja }} | sed 's@[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}/$@@')" >> $GITHUB_OUTPUT

      - name: Replace
        shell: bash
        run: |
          set -euo pipefail

          installer="./stable/PicGuard.PicGuard.Pro.installer.yaml"

          # 先做全局变量
          sed -i \
            -e "s/\${version}/${VERSION}/g" \
            -e "s/\${release}/${RELEASE}/g" \
            -e "s/\${release_date}/${RELEASE_DATE}/g" \
            "$installer"

          # 一个映射表：prefix -> locale -> arch
          items=(
            "en:en-US:x64"
            "en:en-US:arm64"
            "zh:zh-CN:x64"
            "zh:zh-CN:arm64"
          )

          # 提取所有唯一的 locale 值
          declare -A locale_set

          # 处理 installer.yaml 中的架构相关替换
          for item in "${items[@]}"; do
            prefix="${item%%:*}"       # prefix
            temp="${item#*:}"
            loc="${temp%%:*}"     # locale
            arch="${temp##*:}"    # arch

            # 收集唯一的 locale 值
            if [[ -z "${locale_set[$loc]+x}" ]]; then
              locale_set["$loc"]=1
            fi

            up_prefix="$(echo "$prefix" | tr '[:lower:]' '[:upper:]')"
            up_arch="$(echo "$arch" | tr '[:lower:]' '[:upper:]')"

            sha_var="${up_prefix}_${up_arch}_SHA256"
            prod_var="${up_prefix}_${up_arch}_PRODUCT"
            upg_var="${up_prefix}_${up_arch}_UPGRADE"

            sha="${!sha_var}"
            prod="${!prod_var}"
            upg="${!upg_var}"

            # installer.yaml：替换 sha / productcode / upgradecode
            sed -i \
              -e "s/\${${prefix}_${arch}_sha256}/${sha}/g" \
              -e "s/'\${${prefix}_${arch}_productcode}'/'${prod}'/g" \
              -e "s/'\${${prefix}_${arch}_upgradecode}'/'${upg}'/g" \
              "$installer"
          done

          # 处理 locale.<loc>.yaml：只替 version / release
          for loc in "${!locale_set[@]}"; do
            sed -i \
              -e "s/\${version}/${VERSION}/g" \
              -e "s/\${release}/${RELEASE}/g" \
              "./stable/PicGuard.PicGuard.Pro.locale.${loc}.yaml"
          done

          # 主入口 yaml
          sed -i -e "s/\${version}/${VERSION}/g" ./stable/PicGuard.PicGuard.Pro.yaml
        env:
          VERSION: ${{ needs.get_version.outputs.version }}
          RELEASE: ${{ needs.get_version.outputs.release }}
          RELEASE_DATE: ${{ steps.date.outputs.release_date }}
          # 把 step outputs 映射成环境变量，方便在 bash 循环里间接引用
          EN_X64_SHA256: ${{ steps.sha256.outputs.en_x64_sha256 }}
          EN_X64_PRODUCT: ${{ steps.sha256.outputs.en_x64_productcode }}
          EN_X64_UPGRADE: ${{ steps.sha256.outputs.en_x64_upgradecode }}

          EN_ARM64_SHA256: ${{ steps.sha256.outputs.en_arm64_sha256 }}
          EN_ARM64_PRODUCT: ${{ steps.sha256.outputs.en_arm64_productcode }}
          EN_ARM64_UPGRADE: ${{ steps.sha256.outputs.en_arm64_upgradecode }}

          ZH_X64_SHA256: ${{ steps.sha256.outputs.zh_x64_sha256 }}
          ZH_X64_PRODUCT: ${{ steps.sha256.outputs.zh_x64_productcode }}
          ZH_X64_UPGRADE: ${{ steps.sha256.outputs.zh_x64_upgradecode }}

          ZH_ARM64_SHA256: ${{ steps.sha256.outputs.zh_arm64_sha256 }}
          ZH_ARM64_PRODUCT: ${{ steps.sha256.outputs.zh_arm64_productcode }}
          ZH_ARM64_UPGRADE: ${{ steps.sha256.outputs.zh_arm64_upgradecode }}

      - uses: actions/upload-artifact@v7
        with:
          name: manifest-pro-${{ inputs.tag_name }}
          path: |
            ./stable/PicGuard.PicGuard.Pro.installer.yaml
            ./stable/PicGuard.PicGuard.Pro.locale.*.yaml
            ./stable/PicGuard.PicGuard.Pro.yaml
